<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vote Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#0b0012;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
max-width:1200px;
margin:auto;
}
</style>
</head>

<body>

<h1>Total Vote Over Time</h1>
<canvas id="voteChart"></canvas>

<script>

let chart

async function loadData(){

const history = await fetch("history.json").then(r=>r.json())

if(history.length === 0) return

const artists = history[0].votes.map(v=>v.name)

const labels = history.map(h=>h.time)

const datasets = artists.map(name=>({

label:name,

data:history.map(h=>{
const artist = h.votes.find(v=>v.name===name)
return artist ? artist.vote : 0
}),

borderWidth:2,
tension:0.3

}))

if(!chart){

chart = new Chart(document.getElementById("voteChart"),{

type:"line",

data:{
labels,
datasets
},

options:{
responsive:true,
plugins:{
legend:{
labels:{color:"white"}
}
},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}
}

})

}else{

chart.data.labels = labels
chart.data.datasets = datasets
chart.update()

}

}

loadData()

setInterval(loadData,60000)

</script>

</body>
</html>
