<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vote Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
background:#0b0012;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:30px;
}

canvas{
max-width:1200px;
margin:auto;
}

table{
margin:40px auto;
border-collapse:collapse;
width:600px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

.highlight{
color:#c026ff;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Vote Growth (24h)</h1>
<canvas id="growthChart"></canvas>

<h1>Total Vote Over Time</h1>
<canvas id="totalChart"></canvas>

<h1>Live Ranking</h1>
<table id="ranking">
<thead>
<tr>
<th>Rank</th>
<th>Artist</th>
<th>Votes</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const COLORS = {
"LAMOON":"#a855f7",
"Son K":"#3b82f6",
"CONGB":"#f59e0b",
"UPRIZE O.D - Đức Duy":"#14b8a6",
"MYLINA":"#8b5cf6",
"Đào Lê Phương Chi":"#facc15",
"Bùi Trường Linh (Buitruonglinh)":"#e5e7eb",
"T.R.I":"#22c55e",
"Mer":"#ec4899",
"Jaysonlei":"#ef4444"
}

let growthChart;
let totalChart;

async function loadData(){

const votes = await fetch("votes.json").then(r=>r.json())
const history = await fetch("history.json").then(r=>r.json())

updateRanking(votes)
updateCharts(votes,history)

}

function updateRanking(votes){

const sorted = Object.entries(votes).sort((a,b)=>b[1]-a[1])

const tbody = document.querySelector("#ranking tbody")
tbody.innerHTML=""

sorted.forEach((row,i)=>{

const tr=document.createElement("tr")

if(row[0]==="LAMOON") tr.classList.add("highlight")

tr.innerHTML=`
<td>${i+1}</td>
<td>${row[0]}</td>
<td>${row[1].toLocaleString()}</td>
`

tbody.appendChild(tr)

})

}

function updateCharts(votes,history){

const artists = Object.keys(votes)

const labels = Array.from({length:24},(_,i)=>i+"h")

let growthData={}

artists.forEach(a=>growthData[a]=Array(24).fill(0))

history.forEach((snap,i)=>{

if(i===0) return

const prev = history[i-1]

const hour = new Date(snap.time).getHours()

artists.forEach(a=>{

let diff = snap.votes[a]-prev.votes[a]

if(diff<0) diff=0   // prevent negative

growthData[a][hour]+=diff

})

})

let datasetsGrowth = artists.map(a=>({

label:a,
data:growthData[a],
borderColor:COLORS[a] || "#fff",
backgroundColor:"transparent",
borderWidth:a==="LAMOON"?4:2,
tension:0.4

}))

if(!growthChart){

growthChart = new Chart(document.getElementById("growthChart"),{
type:"line",
data:{labels,datasets:datasetsGrowth},
options:{
responsive:true,
plugins:{legend:{labels:{color:"white"}}},
scales:{
y:{
beginAtZero:true,
min:0,
ticks:{color:"white"}
},
x:{ticks:{color:"white"}}
}
}
})

}else{

growthChart.data.datasets=datasetsGrowth
growthChart.update()

}

let labelsTotal = history.map(h=>new Date(h.time).toLocaleTimeString())

let datasetsTotal = artists.map(a=>({

label:a,
data:history.map(h=>h.votes[a]),
borderColor:COLORS[a]||"#fff",
backgroundColor:"transparent",
borderWidth:a==="LAMOON"?4:2,
tension:0.3

}))

if(!totalChart){

totalChart = new Chart(document.getElementById("totalChart"),{
type:"line",
data:{labels:labelsTotal,datasets:datasetsTotal},
options:{
responsive:true,
plugins:{legend:{labels:{color:"white"}}},
scales:{
y:{beginAtZero:true,ticks:{color:"white"}},
x:{ticks:{color:"white"}}
}
}
})

}else{

totalChart.data.labels=labelsTotal
totalChart.data.datasets=datasetsTotal
totalChart.update()

}

}

loadData()

setInterval(loadData,60000)

</script>

</body>
</html>
