name: Update Vote History

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install requests
        run: pip install requests

      - name: Run updater
        run: python update_votes.py

      - name: Commit changes
        run: |
          git config --global user.name "vote-bot"
          git config --global user.email "bot@github.com"
          git add history.json
          git commit -m "update vote history" || exit 0
          git push
